  <script>
    (function() {
      const bundle = window.__ROUTE_BUNDLE__;
      const chipsEl = document.getElementById("chips");
      const listEl = document.getElementById("list");
      const dayCountEl = document.getElementById("dayCount");
      const dayCountHintEl = document.getElementById("dayCountHint");

      let map;
      let activeDay = "all";
      let dayCount = bundle.defaultDayCount;
      let currentVariant = bundle.variants[String(dayCount)];
      const objects = [];
      const stopById = new Map();
      const palette = ["#ef4444", "#3b82f6", "#22c55e", "#a855f7", "#f59e0b", "#14b8a6", "#f97316", "#64748b"];

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function colorByDay(day) {
        if (Number(day) === 0) return "#6b7280";
        return bundle.dayColors[String(day)] || palette[(Number(day) - 1) % palette.length];
      }

      function setVariant(nextDayCount) {
        const fallback = bundle.variants[String(bundle.defaultDayCount)];
        currentVariant = bundle.variants[String(nextDayCount)] || fallback;
        if (activeDay !== "all" && !currentVariant.dayKeys.includes(activeDay)) {
          activeDay = "all";
        }
      }

      function updateDayHint() {
        dayCountHintEl.textContent = `${currentVariant.routeStopCount} точек`;
      }

      function initDayControl() {
        dayCountEl.innerHTML = "";
        for (let count = 1; count <= bundle.maxDayCount; count += 1) {
          const option = document.createElement("option");
          option.value = String(count);
          option.textContent = `${count}`;
          dayCountEl.appendChild(option);
        }
        dayCountEl.value = String(dayCount);
        dayCountEl.addEventListener("change", () => {
          dayCount = Number(dayCountEl.value) || bundle.defaultDayCount;
          activeDay = "all";
          setVariant(dayCount);
          renderChips();
          renderList();
          initMapObjects();
          renderMapObjects();
          updateDayHint();
        });
      }

      function renderChips() {
        chipsEl.innerHTML = "";
        const allBtn = document.createElement("button");
        allBtn.className = "chip" + (activeDay === "all" ? " active" : "");
        allBtn.textContent = "Все дни";
        allBtn.style.background = activeDay === "all" ? "#111827" : "#fff";
        allBtn.onclick = () => setDay("all");
        chipsEl.appendChild(allBtn);

        currentVariant.dayKeys.forEach((day) => {
          const btn = document.createElement("button");
          const color = colorByDay(day);
          btn.className = "chip" + (activeDay === day ? " active" : "");
          btn.textContent = currentVariant.dayLabels[day];
          btn.style.background = activeDay === day ? color : "#fff";
          btn.onclick = () => setDay(day);
          chipsEl.appendChild(btn);
        });
      }

      function buildMetaLine(stop) {
        const parts = [];
        if (stop.time) {
          parts.push(escapeHtml(stop.time));
        } else {
          parts.push("Гибкое время");
        }
        return parts.join(" • ");
      }

      function compactHoursLabel(openingHours) {
        const raw = String(openingHours || "").trim();
        if (!raw) return "";
        if (/24\s*\/\s*7|круглосуточ/i.test(raw)) return "24/7";
        const match = raw.match(/(\d{1,2}:\d{2}\s*[-–—]\s*\d{1,2}:\d{2})/);
        if (match) {
          return match[1].replace(/[–—]/g, "-").replace(/\s*-\s*/g, "-");
        }
        return raw.length > 12 ? `${raw.slice(0, 11)}…` : raw;
      }

      function buildHoursBadge(stop) {

        const hours = escapeHtml(stop.openingHours);
        const compactHours = compactHoursLabel(stop.openingHours);
        if (!compactHours) return "";
        return `
          <span class="item-hours-chip" title="Часы работы: ${hours}" aria-label="Часы работы: ${hours}">
            <svg class="item-hours-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <circle cx="8" cy="8" r="6.25" stroke="currentColor" stroke-width="1.5"></circle>
              <path d="M8 4.8V8L10.4 9.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"></path>
            </svg>
            <span class="item-hours-text">${escapeHtml(compactHours)}</span>
          </span>
        `;
      }

      function renderList() {
        listEl.innerHTML = "";
        stopById.clear();
        const groups = {};
        currentVariant.dayKeys.forEach((day) => (groups[day] = []));

        currentVariant.dayKeys.forEach((day) => {

          const title = document.createElement("div");
          title.className = "group-title";
          title.textContent = currentVariant.dayLabels[day];
          listEl.appendChild(title);

          items.forEach((item) => {

              <div class="item-meta">${buildMetaLine(item)}</div>
            `;
            card.onclick = () => focusStop(item._id);
            listEl.appendChild(card);
          });
        });
      }

      function setDay(day) {
        activeDay = day;
        renderChips();
        renderList();
        renderMapObjects();
      }

      function buildBalloon(stop) {
        const time = stop.time ? `<div style="color:#6b7280;font-size:12px;margin-top:3px;">${escapeHtml(stop.time)}</div>` : "";
        const openingHours = stop.openingHours
          ? `<div style="color:#6b7280;font-size:12px;margin-top:3px;">часы работы: ${escapeHtml(stop.openingHours)}</div>`
          : "";
        const notes = stop.notes ? `<div style="margin-top:6px;line-height:1.35;">${escapeHtml(stop.notes)}</div>` : "";
        return `
          <div style="min-width:220px;max-width:320px;font-family:Arial,sans-serif;">
            <div style="font-weight:700;font-size:14px;">${escapeHtml(stop.name)}</div>
            <div style="color:#6b7280;font-size:12px;">${escapeHtml(stop.label || "")}</div>
            ${time}
            ${openingHours}
            ${notes}
          </div>
        `;
      }

      function initMapObjects() {
        objects.length = 0;
        const byDay = {};
        currentVariant.dayKeys.forEach((day) => (byDay[day] = []));

        currentVariant.stops.forEach((stop) => {
          const day = String(stop.day);
          const color = colorByDay(day);
          const marker = new ymaps.Placemark(
            [stop.lat, stop.lon],
            {
              balloonContent: buildBalloon(stop),
              hintContent: stop.name,
            },
            {
              preset: "islands#dotIcon",
              iconColor: color,
            }
          );
          objects.push({ day, type: "marker", id: String(stop._sourceId), obj: marker });
          if (!byDay[day]) byDay[day] = [];
          byDay[day].push(stop);
        });

        currentVariant.dayKeys.forEach((day) => {
          const routeStops = (byDay[day] || [])
            .filter((stop) => (stop.order || 0) > 0)
            .sort((a, b) => (a.order || 0) - (b.order || 0));
          if (routeStops.length < 2) return;
          const route = new ymaps.Polyline(
            routeStops.map((stop) => [stop.lat, stop.lon]),
            {
              hintContent: "Маршрут: " + currentVariant.dayLabels[day],
            },
            {
              strokeColor: colorByDay(day),
              strokeWidth: 4,
              strokeOpacity: 0.75,
            }
          );
          objects.push({ day, type: "polyline", obj: route });
        });
      }

      function renderMapObjects() {
        if (!map) return;
        map.geoObjects.removeAll();
        objects.forEach((entry) => {
          if (activeDay === "all" || entry.day === activeDay) {
            map.geoObjects.add(entry.obj);
          }
        });
      }

      function focusStop(id) {
        const stop = stopById.get(String(id));
        if (!stop || !map) return;
        map.setCenter([stop.lat, stop.lon], Math.max(bundle.zoom, 14), { duration: 250 });
      }

      ymaps.ready(function() {
        map = new ymaps.Map("map", {
          center: bundle.center,
          zoom: bundle.zoom,
          controls: ["zoomControl", "typeSelector", "fullscreenControl"],
        });
        initMapObjects();
        renderMapObjects();
      });

      initDayControl();
      setVariant(dayCount);
      setDay("all");
      updateDayHint();
    })();
