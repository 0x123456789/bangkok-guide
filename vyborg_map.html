    :root {

    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Roboto", "Noto Sans", Arial, sans-serif;
      color: var(--text);
      background: var(--bg);

    .layout {
      display: grid;
      grid-template-areas: "panel map";
      grid-template-columns: minmax(320px, 38vw) minmax(0, 1fr);
      grid-template-rows: minmax(0, 1fr);
      height: 100vh;
      gap: 0;
    }
    .panel {
      grid-area: panel;
      background: var(--panel);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 18px 18px 0;
    }
    .panel-controls {
      flex: 0 0 auto;
      background: var(--panel);
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 0;
    }
    .title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .day-count-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
      margin-bottom: 14px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
    }
    .day-count-label {
      font-size: 12px;
      color: var(--muted);
    }
    .day-count-select {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 13px;
      background: #fff;
      color: var(--text);
      cursor: pointer;
    }
    .day-count-hint {
      font-size: 12px;
      color: var(--muted);
      margin-left: auto;
      white-space: nowrap;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 0;
    }
    .days-toggle {
      display: none;
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }
    .days-toggle-icon {
      color: var(--muted);
      font-size: 11px;
      transition: transform 0.18s ease;
      transform-origin: center;
    }
    .panel-controls.mobile-collapsed .days-toggle-icon {
      transform: rotate(-90deg);
    }
    .chip {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      font-size: 12px;
      padding: 7px 11px;
      cursor: pointer;
    }
    .chip.active {
      color: #fff;
      border-color: transparent;
    }
    .list {
      display: flex;
      flex-direction: column;
      flex: 1 1 auto;
      overflow: auto;
      gap: 10px;
      padding: 10px 0 18px;
    }
    .group-title {
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0;
      margin-bottom: 4px;
    }
    .item {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 12px;
      padding: 10px 12px;
      cursor: pointer;
      text-align: left;
      position: relative;
    }
    .item:hover {
      box-shadow: 0 4px 14px rgba(17, 24, 39, 0.08);
    }
    .item-header {
      display: flex;
      align-items: flex-start;
      margin-bottom: 4px;
    }
    .item-name {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.25;
      margin-bottom: 0;
      padding-right: 26px;
    }
    .item-hours-chip {
      position: absolute;
      top: 8px;
      right: 8px;
      display: inline-flex;
      align-items: center;
      gap: 3px;
      max-width: 96px;
      border: 1px solid #dbe3ee;
      background: #f8fafc;
      border-radius: 999px;
      color: #64748b;
      padding: 2px 6px 2px 5px;
    }
    .item-hours-icon {
      width: 10px;
      height: 10px;
      flex: 0 0 auto;
    }
    .item-hours-text {
      font-size: 10px;
      line-height: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #475569;
      font-variant-numeric: tabular-nums;
    }
    .item-meta {
      font-size: 12px;
      color: var(--muted);
    }
    #map {
      grid-area: map;
      width: 100%;
      height: 100%;
      min-height: 0;
    }
    @media (max-width: 960px) {
      .layout {
        grid-template-areas:
          "map"
          "panel";
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 30dvh) minmax(0, 70dvh);
      }
      .panel {
        border-right: 0;
        border-top: 1px solid var(--line);
        padding: 14px 14px 0;
      }
      #map {
        min-height: 0;
        max-height: 30dvh;
      }
      .day-count-wrap {
        flex-wrap: wrap;
        margin-bottom: 10px;
      }
      .day-count-hint {
        margin-left: 0;
      }
      .days-toggle {
        display: inline-flex;
      }
      .panel-controls.mobile-collapsed .chips {
        display: none;
      }
    }
  </style>
</head>

        `;
      }

      function renderList() {
        listEl.innerHTML = "";
        stopById.clear();
        const groups = {};
        currentVariant.dayKeys.forEach((day) => (groups[day] = []));

        currentVariant.stops.forEach((stop) => {
          const id = String(stop._sourceId);
          stopById.set(id, stop);
          const day = String(stop.day);
          if (!(day in groups)) groups[day] = [];
          groups[day].push({ ...stop, _id: id });
        });

        currentVariant.dayKeys.forEach((day) => {
          if (activeDay !== "all" && activeDay !== day) return;
          const items = (groups[day] || []).sort((a, b) => (a.order || 999) - (b.order || 999));
          if (!items.length) return;

          const title = document.createElement("div");
          title.className = "group-title";
          title.textContent = currentVariant.dayLabels[day];
          listEl.appendChild(title);

          items.forEach((item) => {
            const card = document.createElement("button");
            card.className = "item";
            card.innerHTML = `
              <div class="item-header">
                <div class="item-name">${escapeHtml(item.name)}</div>
                ${buildHoursBadge(item)}
              </div>
              <div class="item-meta">${buildMetaLine(item)}</div>
            `;
            card.onclick = () => focusStop(item._id);
            listEl.appendChild(card);
          });
        });
      }

      function setDay(day) {
        activeDay = day;
        renderChips();
        renderList();
        renderMapObjects();
      }

      function buildBalloon(stop) {
        const time = stop.time ? `<div style="color:#6b7280;font-size:12px;margin-top:3px;">${escapeHtml(stop.time)}</div>` : "";
        const openingHours = stop.openingHours
          ? `<div style="color:#6b7280;font-size:12px;margin-top:3px;">часы работы: ${escapeHtml(stop.openingHours)}</div>`
          : "";
        const notes = stop.notes ? `<div style="margin-top:6px;line-height:1.35;">${escapeHtml(stop.notes)}</div>` : "";
        return `
          <div style="min-width:220px;max-width:320px;font-family:Arial,sans-serif;">
            <div style="font-weight:700;font-size:14px;">${escapeHtml(stop.name)}</div>
            <div style="color:#6b7280;font-size:12px;">${escapeHtml(stop.label || "")}</div>
            ${time}
            ${openingHours}
            ${notes}
          </div>
        `;
      }

      function initMapObjects() {
        objects.length = 0;
        const byDay = {};
        currentVariant.dayKeys.forEach((day) => (byDay[day] = []));

        currentVariant.stops.forEach((stop) => {
          const day = String(stop.day);
          const color = colorByDay(day);
          const marker = new ymaps.Placemark(
            [stop.lat, stop.lon],
            {
              balloonContent: buildBalloon(stop),
              hintContent: stop.name,
            },
            {
              preset: "islands#dotIcon",
              iconColor: color,
            }
          );
          objects.push({ day, type: "marker", id: String(stop._sourceId), obj: marker });
          if (!byDay[day]) byDay[day] = [];
          byDay[day].push(stop);
        });

        currentVariant.dayKeys.forEach((day) => {
          const routeStops = (byDay[day] || [])
            .filter((stop) => (stop.order || 0) > 0)
            .sort((a, b) => (a.order || 0) - (b.order || 0));
          if (routeStops.length < 2) return;
          const route = new ymaps.Polyline(
            routeStops.map((stop) => [stop.lat, stop.lon]),
            {
              hintContent: "Маршрут: " + currentVariant.dayLabels[day],
            },
            {
              strokeColor: colorByDay(day),
              strokeWidth: 4,
              strokeOpacity: 0.75,
            }
          );
          objects.push({ day, type: "polyline", obj: route });
        });
      }

      function renderMapObjects() {
        if (!map) return;
        map.geoObjects.removeAll();
        objects.forEach((entry) => {
          if (activeDay === "all" || entry.day === activeDay) {
            map.geoObjects.add(entry.obj);
          }
        });
      }

      function focusStop(id) {
        const stop = stopById.get(String(id));
        if (!stop || !map) return;
        map.setCenter([stop.lat, stop.lon], Math.max(bundle.zoom, 14), { duration: 250 });
      }

      ymaps.ready(function() {
        map = new ymaps.Map("map", {
          center: bundle.center,
          zoom: bundle.zoom,
          controls: ["zoomControl", "typeSelector", "fullscreenControl"],
        });
        initMapObjects();
        renderMapObjects();
      });

      initDayControl();
      initMobileDaysMenu();
      setVariant(dayCount);
      setDay("all");
      updateDayHint();
    })();
  </script>
</body>
</html>
